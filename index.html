<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoYoverse 云端枢纽 | Cloud Gaming Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a1c29 0%, #0d0e15 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            animation: fadeInDown 1s ease;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #8b949e;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            padding: 20px 40px 80px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: default;
            animation: fadeInUp 0.8s ease backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 210, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-image {
            width: 100%;
            height: 220px;
            background-color: #161824;
            background-size: cover;
            position: relative;
            transition: transform 0.5s ease;
        }

        .card:hover .card-image {
            transform: scale(1.05);
        }

        .card-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to bottom, rgba(13, 14, 21, 0) 0%, rgba(13, 14, 21, 1) 100%);
        }

        .card-content {
            padding: 30px;
            position: relative;
            z-index: 10;
            background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.02) 100%);
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .game-desc {
            font-size: 0.9rem;
            color: #8b949e;
            margin-bottom: 25px;
            line-height: 1.5;
            height: 40px; 
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px 0;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-sr {
            background: rgba(144, 98, 222, 0.1);
            color: #d1b3ff;
            border: 1px solid rgba(144, 98, 222, 0.4);
        }
        .btn-sr:hover {
            background: #9062de;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(144, 98, 222, 0.6);
        }

        .btn-zzz {
            background: rgba(255, 238, 0, 0.1);
            color: #ffee00;
            border: 1px solid rgba(255, 238, 0, 0.4);
        }
        .btn-zzz:hover {
            background: #ffee00;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 238, 0, 0.6);
        }

        .btn-ys {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-ys:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>HoYoverse 云端枢纽</h1>
        <p>一键接入，随时随地探索广阔世界</p>
    </header>

    <div class="grid-container">
        
        <div class="card">
            <div class="card-image" style="background-image: url('https://pan.mihoyo.date/raw/Share/Picture/index/sr01.png'); background-position: center 15%;"></div>
            <div class="card-content">
                <div class="game-title">《云·星穹铁道》</div>
                <div class="game-desc">愿此行，终抵群星。摆脱硬件束缚，在云端乘坐星穹列车，穿梭于银河之间。</div>
                <a href="https://sr.mihoyo.com/cloud/" target="_blank" class="btn btn-sr">进入云端</a>
            </div>
        </div>

        <div class="card">
            <div class="card-image" style="background-image: url('https://pan.mihoyo.date/raw/Share/Picture/index/zzz01.png'); background-position: center top;"></div>
            <div class="card-content">
                <div class="game-title">《绝区零》</div>
                <div class="game-desc">欢迎来到新艾利都。目前官方云游戏正在筹备中，点击前往官网获取最新情报。</div>
                <a href="https://zzz.mihoyo.com/" target="_blank" class="btn btn-zzz">前往官网</a>
            </div>
        </div>

        <div class="card">
            <div class="card-image" style="background-image: url('https://pan.mihoyo.date/raw/Share/Picture/index/ys01.png'); background-position: center 25%;"></div>
            <div class="card-content">
                <div class="game-title">《云·原神》</div>
                <div class="game-desc">提瓦特大陆的冒险，无需等待下载。超高清画质，极低延迟，随时开启你的旅程。</div>
                <a href="https://ys.mihoyo.com/cloud/" target="_blank" class="btn btn-ys">进入云端</a>
            </div>
        </div>

    </div>

</body>
</html>
